<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 620" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FBF8F2"/><stop offset="1" stop-color="#F1EADC"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#22305C" flood-opacity="0.22"/>
    </filter>
    <g id="pin">
      <path d="M0,-30 C16,-30 26,-18 26,-4 C26,12 6,28 0,36 C-6,28 -26,12 -26,-4 C-26,-18 -16,-30 0,-30 Z" fill="#B0883E" stroke="#8c6a2c" stroke-width="2"/>
    </g>
  </defs>

  <rect width="1000" height="620" fill="url(#bg)"/>
  <rect x="12" y="12" width="976" height="596" fill="none" stroke="#E3DCCB" stroke-width="2"/>

  <!-- parks / greens -->
  <circle cx="250" cy="500" r="58" fill="#D6E6CF"/>
  <circle cx="815" cy="180" r="48" fill="#D6E6CF"/>
  <rect x="600" y="470" width="150" height="90" rx="10" fill="#D6E6CF"/>

  <!-- ROADS -->
  <g stroke="#E7DFCC">
    <rect x="0" y="312" width="1000" height="40" fill="#E7DFCC"/>
    <rect x="0" y="170" width="1000" height="22" fill="#ECE5D4"/>
    <rect x="0" y="468" width="1000" height="22" fill="#ECE5D4"/>
    <rect x="470" y="40" width="40" height="580" fill="#E7DFCC"/>
    <rect x="180" y="40" width="20" height="580" fill="#ECE5D4"/>
    <rect x="770" y="40" width="20" height="580" fill="#ECE5D4"/>
  </g>
  <g stroke="#fff" stroke-width="2.4" stroke-dasharray="16 13">
    <line x1="0" y1="332" x2="1000" y2="332"/>
    <line x1="490" y1="40" x2="490" y2="620"/>
  </g>

  <!-- JR LINE -->
  <line x1="60" y1="250" x2="950" y2="120" stroke="#22305C" stroke-width="11"/>
  <line x1="60" y1="250" x2="950" y2="120" stroke="#fff" stroke-width="2.6" stroke-dasharray="18 15"/>
  <text x="700" y="120" fill="#22305C" font-size="17" font-weight="700" transform="rotate(-8 700 120)">JR 学園都市線</text>

  <!-- STATION -->
  <g filter="url(#sh)">
    <rect x="545" y="172" width="150" height="50" rx="8" fill="#22305C"/>
  </g>
  <text x="620" y="203" fill="#fff" font-size="17" font-weight="700" text-anchor="middle">あいの里教育大駅</text>
  <circle cx="540" cy="197" r="9" fill="#fff" stroke="#22305C" stroke-width="4"/>

  <!-- ROTARY -->
  <circle cx="470" cy="300" r="34" fill="none" stroke="#B7BCC6" stroke-width="9"/>
  <circle cx="470" cy="300" r="12" fill="#CFE3CF"/>
  <text x="470" y="356" fill="#6A6E76" font-size="13" text-anchor="middle">駅前ロータリー</text>

  <!-- PROPERTY -->
  <g transform="translate(360,250)" filter="url(#sh)">
    <use href="#pin"/>
    <circle cx="0" cy="-6" r="11" fill="#fff"/>
    <text x="0" y="-1" fill="#B0883E" font-size="14" font-weight="900" text-anchor="middle">W</text>
  </g>
  <g filter="url(#sh)">
    <rect x="250" y="300" width="170" height="74" rx="10" fill="#B0883E"/>
  </g>
  <text x="335" y="332" fill="#fff" font-size="20" font-weight="900" text-anchor="middle">本物件</text>
  <text x="335" y="356" fill="#fff" font-size="13" text-anchor="middle">駅徒歩1分 ／ 約579坪</text>

  <!-- to Sapporo -->
  <g>
    <line x1="150" y1="232" x2="66" y2="244" stroke="#22305C" stroke-width="3.4"/>
    <polygon points="66,244 88,234 86,252" fill="#22305C"/>
    <text x="60" y="218" fill="#22305C" font-size="15" font-weight="700">← 札幌方面</text>
    <text x="60" y="284" fill="#6A6E76" font-size="12.5">JR 約25〜30分</text>
  </g>

  <!-- FACILITY BADGES (no names, icon-based) -->
  <!-- medical -->
  <g transform="translate(840,430)">
    <circle r="27" fill="#fff" stroke="#C0364A" stroke-width="3" filter="url(#sh)"/>
    <rect x="-4" y="-13" width="8" height="26" rx="2" fill="#C0364A"/><rect x="-13" y="-4" width="26" height="8" rx="2" fill="#C0364A"/>
    <text x="0" y="48" fill="#6A6E76" font-size="12.5" text-anchor="middle">医療機関</text>
  </g>
  <!-- education -->
  <g transform="translate(170,150)">
    <circle r="27" fill="#fff" stroke="#22305C" stroke-width="3" filter="url(#sh)"/>
    <polygon points="0,-12 16,-3 0,6 -16,-3" fill="#22305C"/><rect x="11" y="-3" width="3" height="12" fill="#22305C"/>
    <text x="0" y="48" fill="#6A6E76" font-size="12.5" text-anchor="middle">教育機関</text>
  </g>
  <!-- shopping -->
  <g transform="translate(690,460)">
    <circle r="27" fill="#fff" stroke="#B0883E" stroke-width="3" filter="url(#sh)"/>
    <path d="M-11,-6 h22 l-3,18 h-16 z" fill="none" stroke="#B0883E" stroke-width="3"/>
    <path d="M-6,-6 a6,7 0 0 1 12,0" fill="none" stroke="#B0883E" stroke-width="3"/>
    <text x="0" y="48" fill="#6A6E76" font-size="12.5" text-anchor="middle">商業施設</text>
  </g>
  <!-- park -->
  <g transform="translate(250,500)">
    <circle r="24" fill="#fff" stroke="#5E8E5A" stroke-width="3" filter="url(#sh)"/>
    <rect x="-2" y="2" width="4" height="12" fill="#5E8E5A"/><circle cx="0" cy="-4" r="11" fill="#9CC195"/>
    <text x="0" y="44" fill="#6A6E76" font-size="12" text-anchor="middle">公園</text>
  </g>

  <!-- COMPASS -->
  <g transform="translate(930,80)">
    <circle r="26" fill="#fff" stroke="#E3DCCB" stroke-width="2"/>
    <polygon points="0,-20 6,2 0,-4 -6,2" fill="#C0364A"/>
    <polygon points="0,20 6,-2 0,4 -6,-2" fill="#9AA0AC"/>
    <text x="0" y="-26" fill="#22305C" font-size="12" font-weight="700" text-anchor="middle">N</text>
  </g>

  <!-- TITLE -->
  <text x="40" y="58" fill="#B0883E" font-size="13" font-weight="700" letter-spacing="3" font-family="Inter,sans-serif">AREA GUIDE</text>
  <text x="40" y="86" fill="#22305C" font-size="24" font-weight="900">周辺案内図</text>

  <!-- LEGEND -->
  <g transform="translate(40,560)" font-size="12.5" fill="#5A5E66">
    <rect x="-8" y="-26" width="470" height="40" rx="8" fill="#fff" stroke="#E3DCCB"/>
    <rect x="6" y="-15" width="16" height="13" rx="2" fill="#B0883E"/><text x="30" y="-4">本物件</text>
    <rect x="92" y="-15" width="22" height="9" rx="2" fill="#22305C"/><text x="122" y="-4">JR / 駅</text>
    <rect x="188" y="-15" width="22" height="13" fill="#E7DFCC"/><text x="218" y="-4">主要道路</text>
    <rect x="288" y="-15" width="22" height="13" rx="3" fill="#D6E6CF"/><text x="318" y="-4">公園 / 緑地</text>
  </g>

  <text x="960" y="600" fill="#AEB1B7" font-size="11" text-anchor="end">※ 周辺の位置関係を示すイメージ図です。距離・縮尺・方位は正確ではありません。</text>
</svg>
