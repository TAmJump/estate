<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 540" font-family="'Noto Sans JP',sans-serif">
  <defs>
    <linearGradient id="bgZ" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FBF8F2"/><stop offset="1" stop-color="#F4EFE5"/></linearGradient>
    <marker id="arZ" markerWidth="12" markerHeight="12" refX="8" refY="4" orient="auto"><path d="M0,0 L9,4 L0,8 Z" fill="#22305C"/></marker>
  </defs>
  <rect width="1000" height="540" fill="url(#bgZ)"/>
  <g transform="translate(955,46)"><circle r="18" fill="#fff" stroke="#E9E3D6"/><path d="M0,-11 L4,4 L0,1 L-4,4 Z" fill="#22305C"/><text x="0" y="-22" text-anchor="middle" font-size="10" fill="#6A6E76" font-weight="700">N</text></g>

  <!-- 大通り（環状通） -->
  <rect x="0" y="0" width="108" height="540" fill="#DAD0BB"/>
  <line x1="54" y1="0" x2="54" y2="540" stroke="#FBF8F2" stroke-width="4" stroke-dasharray="20 16"/>
  <g fill="#fff" stroke="#C7BA9C" stroke-width="1"><rect x="28" y="90" width="34" height="20" rx="4"/><rect x="28" y="220" width="34" height="20" rx="4"/><rect x="28" y="350" width="34" height="20" rx="4"/></g>
  <text x="54" y="500" transform="rotate(-90 54 500)" text-anchor="start" font-size="20" fill="#7E6E45" font-weight="800">環状通（大通り）</text>

  <!-- 土地ぜんたい -->
  <rect x="130" y="44" width="846" height="452" rx="16" fill="#fff" stroke="#E4DCC9" stroke-width="2"/>
  <text x="146" y="34" font-size="13" fill="#8C9098">↓ 土地を上から見た図（約535坪）</text>

  <!-- 駐車場・入口（道路側） -->
  <rect x="150" y="64" width="196" height="412" rx="10" fill="#F1EADA" stroke="#CDBF9E" stroke-width="2"/>
  <text x="248" y="118" text-anchor="middle" font-size="21" fill="#5E5128" font-weight="800">駐車場・入口</text>
  <text x="248" y="146" text-anchor="middle" font-size="13" fill="#8C7A4E">760-133（現況：古家 → 解体）</text>
  <g fill="#fff" stroke="#CDBF9E" stroke-width="1.4">
    <rect x="178" y="300" width="30" height="18" rx="3"/><rect x="214" y="300" width="30" height="18" rx="3"/><rect x="250" y="300" width="30" height="18" rx="3"/><rect x="286" y="300" width="30" height="18" rx="3"/>
    <rect x="178" y="330" width="30" height="18" rx="3"/><rect x="214" y="330" width="30" height="18" rx="3"/><rect x="250" y="330" width="30" height="18" rx="3"/><rect x="286" y="330" width="30" height="18" rx="3"/>
  </g>

  <!-- 建物 -->
  <rect x="368" y="92" width="360" height="328" rx="12" fill="#22305C" stroke="#19244A" stroke-width="2"/>
  <text x="548" y="232" text-anchor="middle" font-size="30" fill="#fff" font-weight="900">建物</text>
  <text x="548" y="270" text-anchor="middle" font-size="19" fill="#fff" font-weight="700">中層複合（4〜5階）</text>
  <text x="548" y="300" text-anchor="middle" font-size="14" fill="#C49A4E">760-134（一番大きい敷地）／延床〜約3,300㎡</text>

  <!-- 緑地 -->
  <rect x="748" y="250" width="208" height="170" rx="10" fill="#E7F0E9" stroke="#3C7A50" stroke-width="2"/>
  <text x="852" y="328" text-anchor="middle" font-size="18" fill="#2C5E3C" font-weight="800">緑地・付帯</text>
  <text x="852" y="352" text-anchor="middle" font-size="13" fill="#3C7A50">760-137</text>

  <!-- 公衆用道路 -->
  <rect x="748" y="64" width="208" height="160" rx="10" fill="#EFEFEF" stroke="#9AA0A8" stroke-width="2" stroke-dasharray="8 5"/>
  <text x="852" y="134" text-anchor="middle" font-size="17" fill="#5A5E66" font-weight="800">公衆用道路</text>
  <text x="852" y="158" text-anchor="middle" font-size="13" fill="#6A6E76">760-108（裏の出入り）</text>

  <!-- 入口 矢印 -->
  <line x1="92" y1="320" x2="156" y2="320" stroke="#22305C" stroke-width="5" marker-end="url(#arZ)"/>
  <text x="96" y="356" font-size="16" fill="#22305C" font-weight="800">入口（車）</text>

  <text x="146" y="524" font-size="12" fill="#A99F86">※ 建物・駐車の位置は計画上の一例（イメージ）です。実際の配置は測量・設計で決まります。</text>
</svg>
