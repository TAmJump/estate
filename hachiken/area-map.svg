<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 640" font-family="'Noto Sans JP',sans-serif">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FBF8F2"/><stop offset="1" stop-color="#F2ECDF"/>
    </linearGradient>
    <pattern id="rail" width="14" height="10" patternUnits="userSpaceOnUse" patternTransform="rotate(0)">
      <rect width="14" height="10" fill="none"/>
      <rect x="6" y="0" width="2" height="10" fill="#6A6E76"/>
    </pattern>
  </defs>

  <rect width="1120" height="640" fill="url(#sky)"/>

  <!-- 方位 -->
  <g transform="translate(1052,58)">
    <circle r="22" fill="#fff" stroke="#E9E3D6"/>
    <path d="M0,-15 L6,6 L0,1 L-6,6 Z" fill="#22305C"/>
    <text x="0" y="-26" text-anchor="middle" font-size="12" fill="#6A6E76" font-weight="700">N</text>
  </g>

  <!-- 方面ラベル -->
  <text x="560" y="34" text-anchor="middle" font-size="14" fill="#6A6E76" font-weight="700">↑ 環状通　北24条・札幌都心方面</text>
  <text x="560" y="616" text-anchor="middle" font-size="14" fill="#6A6E76" font-weight="700">環状通　発寒・宮の沢方面 ↓</text>

  <!-- 環状通（道道下手稲札幌線）縦の主要道路 -->
  <g>
    <rect x="470" y="0" width="120" height="640" fill="#E4DCC9"/>
    <line x1="530" y1="0" x2="530" y2="640" stroke="#FBF8F2" stroke-width="3" stroke-dasharray="16 14"/>
    <text x="530" y="300" transform="rotate(-90 530 300)" text-anchor="middle" font-size="15" fill="#8C7A4E" font-weight="700" letter-spacing="2">環 状 通（道道 下手稲札幌線）</text>
  </g>

  <!-- 横道（6条通） -->
  <rect x="0" y="298" width="1120" height="44" fill="#ECE5D6"/>
  <line x1="0" y1="320" x2="1120" y2="320" stroke="#FBF8F2" stroke-width="2" stroke-dasharray="12 12"/>

  <!-- JR学園都市線（札沼線・高架） -->
  <g>
    <rect x="40" y="150" width="430" height="12" fill="url(#rail)" stroke="#AEB1B7" stroke-width="1"/>
    <text x="150" y="140" font-size="13" fill="#6A6E76" font-weight="700">JR学園都市線（札沼線・高架）</text>
    <!-- 八軒駅 -->
    <g transform="translate(250,156)">
      <circle r="9" fill="#fff" stroke="#22305C" stroke-width="3"/>
      <text x="0" y="-16" text-anchor="middle" font-size="13" fill="#22305C" font-weight="800">JR「八軒」駅</text>
      <text x="0" y="34" text-anchor="middle" font-size="11" fill="#8C9098">8条東2丁目／徒歩約8分</text>
    </g>
    <text x="60" y="186" font-size="11" fill="#8C9098">← 琴似・桑園・札幌駅方面</text>
    <text x="430" y="186" text-anchor="end" font-size="11" fill="#8C9098">あいの里・当別方面 →</text>
  </g>

  <!-- 物件 -->
  <g transform="translate(590,360)">
    <rect x="0" y="-34" width="150" height="92" rx="6" fill="rgba(176,136,62,0.16)" stroke="#B0883E" stroke-width="3"/>
    <text x="75" y="-2" text-anchor="middle" font-size="15" fill="#22305C" font-weight="900">本物件</text>
    <text x="75" y="20" text-anchor="middle" font-size="11.5" fill="#43474E">八軒6条東5丁目</text>
    <text x="75" y="40" text-anchor="middle" font-size="11.5" fill="#43474E">約499坪・環状通沿い</text>
    <!-- フラッグ -->
    <path d="M0,-34 L0,-70 L18,-62 L0,-54" fill="#B0883E"/>
    <line x1="0" y1="-34" x2="0" y2="-70" stroke="#B0883E" stroke-width="2"/>
  </g>

  <!-- 施設ピン -->
  <!-- 医療 -->
  <g transform="translate(360,90)">
    <circle r="7" fill="#C0364A"/><text x="12" y="5" font-size="12" fill="#43474E" font-weight="600">北海道脳神経外科記念病院</text>
  </g>
  <g transform="translate(700,140)">
    <circle r="7" fill="#C0364A"/><text x="12" y="5" font-size="12" fill="#43474E" font-weight="600">クリニック・歯科</text>
  </g>
  <!-- 公共 -->
  <g transform="translate(150,250)">
    <circle r="7" fill="#22305C"/><text x="12" y="5" font-size="12" fill="#43474E" font-weight="600">八軒中央まちづくりセンター</text>
  </g>
  <g transform="translate(150,430)">
    <circle r="7" fill="#22305C"/><text x="12" y="5" font-size="12" fill="#43474E" font-weight="600">八軒小学校・児童会館</text>
  </g>
  <g transform="translate(150,470)">
    <circle r="7" fill="#22305C"/><text x="12" y="5" font-size="12" fill="#43474E" font-weight="600">郵便局・金融</text>
  </g>
  <!-- 商業 -->
  <g transform="translate(690,400)">
    <circle r="7" fill="#B0883E"/><text x="12" y="5" font-size="12" fill="#43474E" font-weight="600">スーパー・ドラッグ・コンビニ</text>
  </g>
  <g transform="translate(690,470)">
    <circle r="7" fill="#B0883E"/><text x="12" y="5" font-size="12" fill="#43474E" font-weight="600">飲食・ロードサイド店舗</text>
  </g>
  <!-- 公園 -->
  <g transform="translate(80,560)">
    <circle r="7" fill="#3C7A50"/><text x="12" y="5" font-size="12" fill="#43474E" font-weight="600">農試公園・八軒公園 ほか</text>
  </g>
  <!-- 都心方面バス -->
  <g transform="translate(700,250)">
    <circle r="7" fill="#6A6E76"/><text x="12" y="5" font-size="12" fill="#43474E" font-weight="600">バス停「八軒6条東5丁目」（前面）</text>
  </g>

  <!-- 凡例 -->
  <g transform="translate(840,486)">
    <rect x="0" y="0" width="262" height="132" rx="8" fill="#fff" stroke="#E9E3D6"/>
    <text x="16" y="26" font-size="12" fill="#6A6E76" font-weight="700">凡例</text>
    <g transform="translate(16,44)"><circle r="6" fill="#22305C"/><text x="14" y="4" font-size="11.5" fill="#43474E">JR駅・公共施設</text></g>
    <g transform="translate(16,68)"><circle r="6" fill="#C0364A"/><text x="14" y="4" font-size="11.5" fill="#43474E">医療機関</text></g>
    <g transform="translate(16,92)"><circle r="6" fill="#B0883E"/><text x="14" y="4" font-size="11.5" fill="#43474E">商業・生活施設</text></g>
    <g transform="translate(16,116)"><circle r="6" fill="#3C7A50"/><text x="14" y="4" font-size="11.5" fill="#43474E">公園・緑地</text></g>
    <g transform="translate(150,44)"><rect x="-6" y="-6" width="16" height="12" fill="rgba(176,136,62,0.16)" stroke="#B0883E" stroke-width="2"/><text x="16" y="4" font-size="11.5" fill="#43474E">本物件</text></g>
    <g transform="translate(150,68)"><rect x="-6" y="-3" width="16" height="6" fill="#E4DCC9"/><text x="16" y="4" font-size="11.5" fill="#43474E">主要道路（環状通）</text></g>
    <g transform="translate(150,92)"><rect x="-6" y="-3" width="16" height="6" fill="url(#rail)"/><text x="16" y="4" font-size="11.5" fill="#43474E">JR線</text></g>
  </g>

  <text x="24" y="624" font-size="11" fill="#AEB1B7">※ 位置関係を示すイメージ図です。距離・縮尺・方位は正確ではありません。</text>
</svg>
